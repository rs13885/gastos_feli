services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gastos-server
    ports:
      - "3000:3000"
    volumes:
      - ./expenses.db:/app/expenses.db
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: gastos-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    command: caddy reverse-proxy --from https://gastosfeli.marrau.ar --to gastos-server:3000

volumes:
  caddy_data:
  caddy_config:
